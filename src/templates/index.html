<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Intel - מודיעין חזותי</title>

    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --border-color: #475569;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--container-bg);
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.8em;
            margin-bottom: 10px;
            margin-top: 0;
            letter-spacing: 2px;
        }

        p {
            color: #94a3b8;
            font-size: 1.1em;
            margin-bottom: 40px;
        }

        .folder-input-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
            background-color: rgba(255,255,255,0.02);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #0f172a;
            color: white;
            font-size: 1em;
        }

        input[type="text"]::placeholder {
            color: #64748b;
        }

        .submit-btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
            color: white;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
        }
    </style>
</head>

<body>

<div class="container">

<h1>Image Intel</h1>

<p>מערכת סריקה וניתוח נתוני EXIF</p>

<form action="/analyze" method="POST">

<div class="folder-input-area">

<p>הזן נתיב לתיקיית התמונות</p>

<input
type="text"
name="folder_path"
placeholder="לדוגמה: C:\Users\Name\Pictures"
required>

</div>

<button type="submit" class="submit-btn">
התחל ניתוח מודיעיני
</button>

</form>

</div>

</body>
</html>
